<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gagarin TERCOM Simulation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link href="/static/style.css" rel="stylesheet">
</head>
<body>

<div id="app">

<div id="landing-screen">
<div class="landing-card">
<h1>Gagarin <span class="text-primary">TERCOM</span></h1>
<p class="subtitle">Terrain Contour Matching — интерактивная симуляция навигации БПЛА по рельефу</p>

<div class="mb-3">
<label class="form-label" for="scenario-select">Выберите сценарий полёта</label>
<select id="scenario-select" class="form-select form-select-lg bg-dark border-secondary text-light">
<option value="">— Загрузка сценариев... —</option>
</select>
</div>

<div id="scenario-description" class="description-box">
Загрузка...
</div>

<button id="start-btn" class="btn btn-primary btn-lg w-100 mt-3" disabled>
▶ Запустить симуляцию
</button>
</div>
</div>

<div id="sim-screen">
<div class="top-bar">
<div class="progress-wrapper">
<div id="progress-fill" class="progress-fill"></div>
</div>
<span id="step-counter" class="step-counter">Шаг 0/—</span>
    <span id="status-badge" class="status-badge loading">Ожидание</span>
</div>

<div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="pipeline" onclick="switchTab('pipeline')">📊 Pipeline</button>
    <button class="tab-btn" data-tab="recovery" onclick="switchTab('recovery')">🔍 Восстановление</button>
    <button class="tab-btn" data-tab="replan" onclick="switchTab('replan')">🔄 Маршрут</button>
</div>

<div class="sim-layout">
<aside class="step-list" id="step-list">
<div class="text-secondary-emphasis text-center py-3 small">Запустите симуляцию (19 шагов)</div>
</aside>

<main class="step-content">
<div id="step-display">
<div class="text-center py-5">
<div class="text-secondary-emphasis mb-3">Запустите симуляцию, чтобы увидеть пошаговую работу алгоритма TERCOM: от загрузки DEM до интерактивной карты маршрута с анимацией</div>
</div>
</div>
</main>
</div>

<div class="controls">
<button id="prev-btn" class="btn-icon" disabled title="Предыдущий шаг (←)">◀</button>
<button id="play-btn" class="btn-icon" title="Воспроизвести/Пауза (Space)">▶</button>
<button id="next-btn" class="btn-icon" disabled title="Следующий шаг (→)">▶</button>
<div class="speed-group">
<span class="speed-label">Темп:</span>
<button class="speed-btn active" data-speed="1">1×</button>
<button class="speed-btn" data-speed="2">2×</button>
<button class="speed-btn" data-speed="5">5×</button>
<button class="speed-btn" data-speed="10">10×</button>
</div>
<button id="return-btn" class="return-btn ms-2" title="Вернуться к выбору сценария">↩ Сценарии</button>
</div>
<div id="ai-section" class="mt-2 text-center" style="display:none">
<button id="ai-btn" class="btn btn-outline-info btn-lg">
🤖 Анализ ИИ агентов
</button>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
